# Ruff configuration
# Keep this lightweight; tighten as the codebase stabilizes.

target-version = "py310"
line-length = 100

[lint]
select = [
  "E",  # pycodestyle errors
  "F",  # pyflakes
  "I",  # isort
]
ignore = [
  "E501", # line length (leave as formatter concern; many long f-strings/prompts)
  "E731", # allow simple lambdas in tests
  "I001", # don't enforce import sorting yet (keep CI signal low-noise)
]

[format]
quote-style = "double"
