# Eval queries for jidra vs codegraph
# expected: list of substrings that MUST appear in results (case-insensitive)
# type: exact | caller | concept | file
# note: why this query / what correct answer looks like

queries:
  - query: "SearchController"
    expected: ["SearchController"]
    type: exact
    note: "Exact class name — should rank controller methods at rank 1"

  - query: "who calls REDACTED"
    expected: ["REDACTEDImpl", "REDACTEDtImpl", "REDACTEDervice"]
    type: caller
    note: "Caller lookup — recall matters more than rank here"

  - query: "What does REDACTED do"
    expected: ["REDACTED", "relational"]
    type: concept
    note: "Concept query — should surface relational model classes"

  - query: "REDACTED"
    expected: ["REDACTED"]
    type: exact
    note: "Listener class — should appear rank 1"

  - query: "how does REDACTED work"
    expected: ["REDACTED", "REDACTED"]
    type: concept
    note: "Vague concept — tests semantic understanding"

  - query: "REDACTED"
    expected: ["REDACTED"]
    type: exact
    note: "Exact method name — must be rank 1"

  - query: "search REDACTED REDACTED"
    expected: ["REDACTED", "REDACTED"]
    type: concept
    note: "Multi-word concept"

  - query: "REDACTED"
    expected: ["REDACTED"]
    type: exact
    note: "Config class — should appear rank 1"

  - query: "what calls REDACTED"
    expected: ["REDACTED"]
    type: caller
    note: "Caller lookup for specific method"

  - query: "REDACTED search processing"
    expected: ["REDACTED", "REDACTED"]
    type: concept
    note: "Domain concept — tests if NLU components surface"
